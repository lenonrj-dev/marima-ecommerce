services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: Lenon323
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  app1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: &app_env
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://appuser:Lenon323@postgres:5432/appdb?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: marima_moda_fitness
      JWT_REFRESH_SECRET: Moda_fitness_marima
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,https://marima-frontend-bay.vercel.app
      ACCESS_TOKEN_TTL: 30m
      REFRESH_TOKEN_TTL: 7d
      STORE_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  app2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: *app_env
    depends_on:
      - postgres
      - redis
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app1
      - app2
    ports:
      - "4000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
