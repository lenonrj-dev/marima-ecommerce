services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://appuser:Lenon323@host.docker.internal:5432/appdb?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-30m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      STORE_URL: ${STORE_URL}
      ADMIN_URL: ${ADMIN_URL:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
      CACHE_DEBUG: ${CACHE_DEBUG:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    ports:
      - "4000:4000"
